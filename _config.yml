# Site settings
title: Begoña Pericas Herrero # site title
description: >- # site description
  Academic researcher in speech processing and language learning, 
  with experience conducting infant and adult EEG studies and child phonetic 
  training. Code for EEG data analysis at <a href="https://github.com/BPericas" target="_blank" rel="noopener">@github</a>.
lang: en-UK # default lang
timezone: UK # set your timezone
image: assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/BPericas/BPericas.github.io # site repo [optional]
mode: light # default theme "dark" | "light"

# Profile settings
author:
  name: Begoña Pericas Herrero # author name
  bio: >- # tell to the world
     I'm a postdoctoral research fellow at the Department of Speech, Hearing and Phonetic Sciences at University College London. I'm interested in early speech and language learning, as well as in second language phonetic learning, and I use EEG techniques, as well as phonetic training games in infants, children and adults. See my code for EEG data analysis at <a href="https://github.com/BPericas" target="_blank" rel="noopener">@github</a>.
  username: username # general username
  github: BPericas # github username
  linkedIn: Begoña Pericas Herrero # twitter username
  email: begona.herrero.17@ucl.ac.uk # email adress
  researchgate: Begona-Pericas-Herrero # ResearchGate profile name (verify this matches your actual profile URL)
  avatar: /assets/img/avatar.jpg # change with your own avatar
  avatar_width: 3000

# URL settings
url: "https://github.com/BPericas/BPericas.github.io" #
baseurl:
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
